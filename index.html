<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero Carousel</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<section class="hero-carousel" aria-label="Hero Carousel">
  <div class="carousel-track">

    <!-- Vidéo 1 -->
    <div class="slide">
      <video muted preload="metadata" playsinline>
        <source src="media/video1.mp4" type="video/mp4" />
      </video>
    </div>

    <!-- Images -->
    <div class="slide"><img src="media/img1.jpg" loading="lazy" /></div>
    <div class="slide"><img src="media/img2.jpg" loading="lazy" /></div>
    <div class="slide"><img src="media/img3.jpg" loading="lazy" /></div>
    <div class="slide"><img src="media/img4.jpg" loading="lazy" /></div>
    <div class="slide"><img src="media/img5.jpg" loading="lazy" /></div>
    <div class="slide"><img src="media/img6.jpg" loading="lazy" /></div>
    <div class="slide"><img src="media/img7.jpg" loading="lazy" /></div>

    <!-- Vidéo 2 -->
    <div class="slide">
      <video muted preload="metadata" playsinline>
        <source src="media/video2.mp4" type="video/mp4" />
      </video>
    </div>

    <!-- Image finale -->
    <div class="slide"><img src="media/img8.jpg" loading="lazy" /></div>

  </div>

  <!-- Navigation -->
  <button class="nav prev" aria-label="Previous slide">❮</button>
  <button class="nav next" aria-label="Next slide">❯</button>

  <!-- Dots -->
  <div class="dots"></div>
</section>

<script src="script.js" defer></script>
</body>
</html>
